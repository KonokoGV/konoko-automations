name: Notion Maintenance

on:
  schedule:
    # 4x täglich: 10:00, 13:00, 17:00, 21:00 Berlin = 08:00, 11:00, 15:00, 19:00 UTC
    - cron: '0 8 * * *'
    - cron: '0 11 * * *'
    - cron: '0 15 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  maintain:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      TASKS_DB: "9a91d552-bf72-824b-8dcf-01e86dc12569"
      DASHBOARD_DB: "2ef1d552-bf72-8027-9469-c2f1afdfcd75"
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

    steps:
      - name: "1 — Dashboard Cleanup"
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          token = os.environ["NOTION_TOKEN"]
          db = os.environ["DASHBOARD_DB"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}
          def api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())
          pages = api("POST", f"/databases/{db}/query", {"page_size": 100})
          count = 0
          for p in pages.get("results", []):
            t = p.get("properties", {}).get("Name", {}).get("title", [])
            name = t[0]["plain_text"] if t else ""
            if not name.startswith("\U0001f4da"):
              api("PATCH", f"/pages/{p['id']}", {"archived": True})
              print(f"Archiviert: {name[:60]}"); count += 1
          print(f"✅ Dashboard Cleanup: {count} archiviert")
          EOF

      - name: "2 — Alte Tasks: Datum nach vorne schieben"
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          from datetime import date, timedelta
          token = os.environ["NOTION_TOKEN"]
          db = os.environ["TASKS_DB"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}
          def api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())
          today = date.today()
          pages = api("POST", f"/databases/{db}/query", {"filter": {"and": [{"property": "Date", "date": {"before": str(today)}}, {"property": "Status", "status": {"does_not_equal": "Completed"}}]}, "page_size": 100})
          priority_offset = {"High": 0, "Medium": 1, "Low": 3}
          count = 0
          for p in pages.get("results", []):
            props = p.get("properties", {})
            prio_opts = props.get("Priority", {}).get("select", {})
            prio = prio_opts.get("name", "Medium") if prio_opts else "Medium"
            new_date = str(today + timedelta(days=priority_offset.get(prio, 1)))
            api("PATCH", f"/pages/{p['id']}", {"properties": {"Date": {"date": {"start": new_date}}}})
            t = props.get("Name", {}).get("title", [])
            print(f"Verschoben [{prio}] → {new_date}: {(t[0]['plain_text'] if t else '?')[:50]}"); count += 1
          print(f"✅ Alte Tasks: {count} verschoben")
          EOF

      - name: "3 — Completed Tasks archivieren"
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          token = os.environ["NOTION_TOKEN"]
          db = os.environ["TASKS_DB"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}
          def api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())
          pages = api("POST", f"/databases/{db}/query", {"filter": {"property": "Status", "status": {"equals": "Completed"}}, "page_size": 100})
          count = 0
          for p in pages.get("results", []):
            api("PATCH", f"/pages/{p['id']}", {"archived": True})
            t = p.get("properties", {}).get("Name", {}).get("title", [])
            print(f"Archiviert: {(t[0]['plain_text'] if t else '?')[:60]}"); count += 1
          print(f"✅ Completed: {count} archiviert")
          EOF

      - name: "4 — Heutige Tasks → High Priority"
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          from datetime import date
          token = os.environ["NOTION_TOKEN"]
          db = os.environ["TASKS_DB"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}
          def api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())
          today = str(date.today())
          pages = api("POST", f"/databases/{db}/query", {"filter": {"and": [{"property": "Date", "date": {"equals": today}}, {"property": "Status", "status": {"does_not_equal": "Completed"}}]}, "page_size": 100})
          count = 0
          for p in pages.get("results", []):
            props = p.get("properties", {})
            prio = props.get("Priority", {}).get("select", {})
            if prio and prio.get("name") == "High": continue
            api("PATCH", f"/pages/{p['id']}", {"properties": {"Priority": {"select": {"name": "High"}}}})
            t = props.get("Name", {}).get("title", [])
            print(f"→ High: {(t[0]['plain_text'] if t else '?')[:50]}"); count += 1
          print(f"✅ Heute: {count} auf High")
          EOF

      - name: "5 — Tasks ohne Datum: Auto-Datum"
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          from datetime import date, timedelta
          token = os.environ["NOTION_TOKEN"]
          db = os.environ["TASKS_DB"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}
          def api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())
          today = date.today()
          offsets = {"High": 1, "Medium": 3, "Low": 5}
          pages = api("POST", f"/databases/{db}/query", {"filter": {"and": [{"property": "Date", "date": {"is_empty": True}}, {"property": "Status", "status": {"does_not_equal": "Completed"}}]}, "page_size": 100})
          count = 0
          for p in pages.get("results", []):
            props = p.get("properties", {})
            prio_opts = props.get("Priority", {}).get("select", {})
            prio = prio_opts.get("name", "Medium") if prio_opts else "Medium"
            new_date = str(today + timedelta(days=offsets.get(prio, 3)))
            api("PATCH", f"/pages/{p['id']}", {"properties": {"Date": {"date": {"start": new_date}}}})
            t = props.get("Name", {}).get("title", [])
            print(f"Datum [{prio}] → {new_date}: {(t[0]['plain_text'] if t else '?')[:50]}"); count += 1
          print(f"✅ Auto-Datum: {count} datiert")
          EOF

      - name: "6 — In Progress >3 Tage → Not started"
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          from datetime import datetime, timezone, timedelta
          token = os.environ["NOTION_TOKEN"]
          db = os.environ["TASKS_DB"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}
          def api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())
          cutoff = datetime.now(timezone.utc) - timedelta(days=3)
          pages = api("POST", f"/databases/{db}/query", {"filter": {"property": "Status", "status": {"equals": "In progress"}}, "page_size": 100})
          count = 0
          for p in pages.get("results", []):
            edited = p.get("last_edited_time", "")
            if edited and datetime.fromisoformat(edited.replace("Z", "+00:00")) < cutoff:
              api("PATCH", f"/pages/{p['id']}", {"properties": {"Status": {"status": {"name": "Not started"}}}})
              t = p.get("properties", {}).get("Name", {}).get("title", [])
              print(f"Reset: {(t[0]['plain_text'] if t else '?')[:50]}"); count += 1
          print(f"✅ In Progress Reset: {count} zurückgesetzt")
          EOF

      - name: "7 — Google Kalender: Notion Tasks sync"
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import urllib.request, urllib.parse, json, os
          from datetime import date, timedelta

          # --- Google Access Token holen ---
          def get_access_token():
            data = urllib.parse.urlencode({
              "client_id": os.environ["GOOGLE_CLIENT_ID"],
              "client_secret": os.environ["GOOGLE_CLIENT_SECRET"],
              "refresh_token": os.environ["GOOGLE_REFRESH_TOKEN"],
              "grant_type": "refresh_token"
            }).encode()
            req = urllib.request.Request("https://oauth2.googleapis.com/token", data=data)
            with urllib.request.urlopen(req) as r:
              return json.loads(r.read())["access_token"]

          token = get_access_token()
          gcal_headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          notion_headers = {"Authorization": f"Bearer {os.environ['NOTION_TOKEN']}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}

          def notion_api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=notion_headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())

          def gcal_api(method, path, data=None):
            req = urllib.request.Request(f"https://www.googleapis.com/calendar/v3{path}", data=json.dumps(data).encode() if data else None, headers=gcal_headers, method=method)
            try:
              with urllib.request.urlopen(req) as r: return json.loads(r.read())
            except urllib.error.HTTPError as e:
              print(f"GCal Fehler {e.code}: {e.read()[:200]}"); return {}

          # Notion Tasks mit Datum lesen
          tasks = notion_api("POST", f"/databases/{os.environ['TASKS_DB']}/query", {
            "filter": {"and": [
              {"property": "Date", "date": {"is_not_empty": True}},
              {"property": "Status", "status": {"does_not_equal": "Completed"}}
            ]}, "page_size": 100
          })

          today = date.today()
          count = 0
          for p in tasks.get("results", []):
            props = p.get("properties", {})
            t = props.get("Name", {}).get("title", [])
            name = t[0]["plain_text"] if t else ""
            if not name: continue
            task_date = (props.get("Date", {}).get("date", {}) or {}).get("start", "")
            if not task_date: continue

            # Prüfe ob Event schon existiert (suche nach Name + Datum)
            time_min = f"{task_date}T00:00:00+02:00"
            time_max = f"{task_date}T23:59:59+02:00"
            existing = gcal_api("GET", f"/calendars/primary/events?timeMin={urllib.parse.quote(time_min)}&timeMax={urllib.parse.quote(time_max)}&q={urllib.parse.quote(name)}&singleEvents=true")
            found = any(e.get("summary","") == name for e in existing.get("items", []))
            if found: continue

            # Event erstellen (ganztägig)
            event = {
              "summary": name,
              "start": {"date": task_date},
              "end": {"date": task_date},
              "colorId": "11"
            }
            gcal_api("POST", "/calendars/primary/events", event)
            print(f"📅 Task → Kalender: {name[:50]} ({task_date})"); count += 1

          print(f"✅ Tasks → GCal: {count} erstellt")
          EOF
