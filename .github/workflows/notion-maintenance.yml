name: Notion Maintenance

on:
  schedule:
    # 4x täglich: 10:00, 13:00, 17:00, 21:00 Berlin = 08:00, 11:00, 15:00, 19:00 UTC
    - cron: '0 8 * * *'
    - cron: '0 11 * * *'
    - cron: '0 15 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  maintain:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      TASKS_DB: "9a91d552-bf72-824b-8dcf-01e86dc12569"
      DASHBOARD_DB: "2ef1d552-bf72-8027-9469-c2f1afdfcd75"

    steps:
      - name: "1 — Dashboard Cleanup"
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          token = os.environ["NOTION_TOKEN"]
          db = os.environ["DASHBOARD_DB"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}
          def api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())
          pages = api("POST", f"/databases/{db}/query", {"page_size": 100})
          count = 0
          for p in pages.get("results", []):
            t = p.get("properties", {}).get("Name", {}).get("title", [])
            name = t[0]["plain_text"] if t else ""
            if not name.startswith("📚"):
              api("PATCH", f"/pages/{p['id']}", {"archived": True})
              print(f"Archiviert: {name[:60]}"); count += 1
          print(f"✅ Dashboard Cleanup: {count} archiviert")
          EOF

      - name: "2 — Alte Tasks: Datum nach vorne schieben"
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          from datetime import date, timedelta
          token = os.environ["NOTION_TOKEN"]
          db = os.environ["TASKS_DB"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}
          def api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())
          today = date.today()
          pages = api("POST", f"/databases/{db}/query", {"filter": {"and": [{"property": "Date", "date": {"before": str(today)}}, {"property": "Status", "status": {"does_not_equal": "Completed"}}]}, "page_size": 100})
          priority_offset = {"High": 0, "Medium": 1, "Low": 3}
          count = 0
          for p in pages.get("results", []):
            props = p.get("properties", {})
            prio_opts = props.get("Priority", {}).get("select", {})
            prio = prio_opts.get("name", "Medium") if prio_opts else "Medium"
            new_date = str(today + timedelta(days=priority_offset.get(prio, 1)))
            api("PATCH", f"/pages/{p['id']}", {"properties": {"Date": {"date": {"start": new_date}}}})
            t = props.get("Name", {}).get("title", [])
            print(f"Verschoben [{prio}] → {new_date}: {(t[0]['plain_text'] if t else '?')[:50]}"); count += 1
          print(f"✅ Alte Tasks: {count} verschoben")
          EOF

      - name: "3 — Inbox kategorisieren"
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          token = os.environ["NOTION_TOKEN"]
          db = os.environ["TASKS_DB"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}
          def api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())
          keywords = {"ZPO": "ZPO", "Zivilprozess": "ZPO", "FamR": "Familienrecht", "Familie": "Familienrecht", "HR": "Handelsrecht", "HGB": "Handelsrecht", "StR": "Strafrecht", "Straf": "Strafrecht", "VerwR": "Verwaltungsrecht", "BGB": "BGB AT", "Schuldrecht": "Schuldrecht", "EuR": "Europarecht", "Europa": "Europarecht", "Völker": "Völkerrecht"}
          pages = api("POST", f"/databases/{db}/query", {"filter": {"property": "Status", "status": {"equals": "Not started"}}, "page_size": 100})
          count = 0
          for p in pages.get("results", []):
            props = p.get("properties", {})
            t = props.get("Name", {}).get("title", [])
            name = t[0]["plain_text"] if t else ""
            cat = props.get("Category", {}).get("select", None)
            if cat: continue
            for kw, fach in keywords.items():
              if kw.lower() in name.lower():
                api("PATCH", f"/pages/{p['id']}", {"properties": {"Category": {"select": {"name": fach}}}})
                print(f"Kategorisiert: {name[:40]} → {fach}"); count += 1; break
          print(f"✅ Inbox: {count} kategorisiert")
          EOF

      - name: "4 — Completed Tasks archivieren"
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          token = os.environ["NOTION_TOKEN"]
          db = os.environ["TASKS_DB"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}
          def api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())
          pages = api("POST", f"/databases/{db}/query", {"filter": {"property": "Status", "status": {"equals": "Completed"}}, "page_size": 100})
          count = 0
          for p in pages.get("results", []):
            api("PATCH", f"/pages/{p['id']}", {"archived": True})
            t = p.get("properties", {}).get("Name", {}).get("title", [])
            print(f"Archiviert: {(t[0]['plain_text'] if t else '?')[:60]}"); count += 1
          print(f"✅ Completed: {count} archiviert")
          EOF

      - name: "5 — Heutige Tasks → High Priority"
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          from datetime import date
          token = os.environ["NOTION_TOKEN"]
          db = os.environ["TASKS_DB"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}
          def api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())
          today = str(date.today())
          pages = api("POST", f"/databases/{db}/query", {"filter": {"and": [{"property": "Date", "date": {"equals": today}}, {"property": "Status", "status": {"does_not_equal": "Completed"}}]}, "page_size": 100})
          count = 0
          for p in pages.get("results", []):
            props = p.get("properties", {})
            prio = props.get("Priority", {}).get("select", {})
            if prio and prio.get("name") == "High": continue
            api("PATCH", f"/pages/{p['id']}", {"properties": {"Priority": {"select": {"name": "High"}}}})
            t = props.get("Name", {}).get("title", [])
            print(f"→ High: {(t[0]['plain_text'] if t else '?')[:50]}"); count += 1
          print(f"✅ Heute: {count} auf High")
          EOF

      - name: "6 — Tasks ohne Datum: Auto-Datum"
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          from datetime import date, timedelta
          token = os.environ["NOTION_TOKEN"]
          db = os.environ["TASKS_DB"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}
          def api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())
          today = date.today()
          offsets = {"High": 1, "Medium": 3, "Low": 5}
          pages = api("POST", f"/databases/{db}/query", {"filter": {"and": [{"property": "Date", "date": {"is_empty": True}}, {"property": "Status", "status": {"does_not_equal": "Completed"}}]}, "page_size": 100})
          count = 0
          for p in pages.get("results", []):
            props = p.get("properties", {})
            prio_opts = props.get("Priority", {}).get("select", {})
            prio = prio_opts.get("name", "Medium") if prio_opts else "Medium"
            new_date = str(today + timedelta(days=offsets.get(prio, 3)))
            api("PATCH", f"/pages/{p['id']}", {"properties": {"Date": {"date": {"start": new_date}}}})
            t = props.get("Name", {}).get("title", [])
            print(f"Datum [{prio}] → {new_date}: {(t[0]['plain_text'] if t else '?')[:50]}"); count += 1
          print(f"✅ Auto-Datum: {count} datiert")
          EOF

      - name: "7 — In Progress >3 Tage → Not started"
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          from datetime import datetime, timezone, timedelta
          token = os.environ["NOTION_TOKEN"]
          db = os.environ["TASKS_DB"]
          headers = {"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"}
          def api(method, path, data=None):
            req = urllib.request.Request(f"https://api.notion.com/v1{path}", data=json.dumps(data).encode() if data else None, headers=headers, method=method)
            with urllib.request.urlopen(req) as r: return json.loads(r.read())
          cutoff = datetime.now(timezone.utc) - timedelta(days=3)
          pages = api("POST", f"/databases/{db}/query", {"filter": {"property": "Status", "status": {"equals": "In progress"}}, "page_size": 100})
          count = 0
          for p in pages.get("results", []):
            edited = p.get("last_edited_time", "")
            if edited:
              if datetime.fromisoformat(edited.replace("Z", "+00:00")) < cutoff:
                api("PATCH", f"/pages/{p['id']}", {"properties": {"Status": {"status": {"name": "Not started"}}}})
                t = p.get("properties", {}).get("Name", {}).get("title", [])
                print(f"Reset: {(t[0]['plain_text'] if t else '?')[:50]}"); count += 1
          print(f"✅ In Progress Reset: {count} zurückgesetzt")
          EOF
