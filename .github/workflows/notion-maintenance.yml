name: Notion Maintenance (Mac-unabhaengig)

on:
  schedule:
    - cron: '50 6 * * *'
  workflow_dispatch:

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Notion Maintenance
        run: |
          python3 - << 'PYEOF'
          import json, sys, datetime, urllib.request, urllib.error

          TOKEN        = "${{ secrets.NOTION_TOKEN }}"
          TASKS_DB     = "9a91d552-bf72-824b-8dcf-01e86dc12569"
          DASHBOARD_DB = "2ef1d552-bf72-8027-9469-c2f1afdfcd75"

          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Notion-Version": "2022-06-28",
              "Content-Type": "application/json",
          }

          heute = datetime.date.today().isoformat()

          def api(method, path, body=None):
              url  = f"https://api.notion.com/v1/{path}"
              data = json.dumps(body).encode() if body else None
              req  = urllib.request.Request(url, data=data, headers=HEADERS, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f"HTTP {e.code} on {method} {path}", file=sys.stderr)
                  return {}

          def query(db, filt=None):
              body = {"page_size": 100}
              if filt: body["filter"] = filt
              return api("POST", f"databases/{db}/query", body).get("results", [])

          def patch(pid, props=None, archived=False):
              body = {}
              if props:    body["properties"] = props
              if archived: body["archived"]    = True
              api("PATCH", f"pages/{pid}", body)

          def title(p):
              arr = p.get("properties", {}).get("Name", {}).get("title", [])
              return arr[0]["plain_text"] if arr else ""

          fixes = 0

          # 1. Dashboard cleanup
          for p in query(DASHBOARD_DB):
              name = title(p)
              if not name.startswith("\U0001f4da"):
                  patch(p["id"], archived=True)
                  print(f"Dashboard archiviert: {name[:60]}")
                  fixes += 1

          # 2. Veraltete Dates ueber die Woche verteilen (High zuerst)
          outdated = query(TASKS_DB, {"and": [
              {"property": "Date",   "date":   {"before": heute}},
              {"property": "Status", "status": {"does_not_equal": "Completed"}}
          ]})
          PRIO_MAP = {"High": 0, "Medium": 1, "Low": 2}
          outdated_s = sorted(outdated, key=lambda p: PRIO_MAP.get(
              ((p.get("properties", {}).get("Priority") or {}).get("select") or {}).get("name", "Medium"), 1))
          n = len(outdated_s); spread = min(n, 5)
          for i, p in enumerate(outdated_s):
              day   = 1 + (i * spread // max(n, 1))
              new_d = (datetime.date.today() + datetime.timedelta(days=day)).isoformat()
              patch(p["id"], {"Date": {"date": {"start": new_d}}})
              print(f"Datum: {title(p)[:40]} -> {new_d}")
              fixes += 1

          # 3. Inbox kategorisieren
          inbox = query(TASKS_DB, {"and": [
              {"property": "Area",   "relation": {"is_empty":       True}},
              {"property": "Status", "status":   {"does_not_equal": "Completed"}}
          ]})
          for p in inbox:
              n2 = title(p).lower()
              prio = ("High"   if any(w in n2 for w in ["uni","klausur","hausarbeit","pruefung","bafog","erasmus","abgabe"])
                      else "Low" if any(w in n2 for w in ["irgendwann","spater","someday"])
                      else "Medium")
              patch(p["id"], {"Priority": {"select": {"name": prio}}})
              print(f"Inbox: {title(p)[:40]} -> {prio}")
              fixes += 1

          print(f"\n{fixes} Fixes")
          PYEOF
